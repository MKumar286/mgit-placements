<!DOCTYPE html>
<html>
<head>
    <title>TPO Login - MGIT Placements</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #000428, #004e92);
            color: white;
            text-align: center;
            margin-top: 120px;
        }

        .login-box {
            background: white;
            color: black;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ffc107;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e0a800;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

    <script>
        function login() {
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            if (email === "placements@mgit.ac.in" && password === "123") {
                document.getElementById("message").style.color = "green";
               window.location.href = "tpo-dashboard.html";
            } else {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerHTML = "Invalid Mail ID or Password!";
            }
        }
    </script>
</head>

<body>

    <div class="login-box">
        <h2>TPO Login</h2>

        <input type="email" id="email" placeholder="Enter Mail ID" required>
        <input type="password" id="password" placeholder="Enter Password" required>

        <br>
        <button onclick="login()">Login</button>

        <div id="message"></div>
    </div>

</body>
</html>
