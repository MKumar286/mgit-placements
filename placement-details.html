<!DOCTYPE html>
<html>
<head>
    <title>Placement Details - MGIT</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background-color: #004e92;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            background: white;
            color: #004e92;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 100px;
        }

        .year-card {
            background: white;
            width: 220px;   /* smaller than dashboard cards */
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .year-card:hover {
            transform: scale(1.05);
        }

        .year1 {
            border-top: 6px solid #28a745;   /* Green */
        }

        .year2 {
            border-top: 6px solid #ff5733;   /* Orange/Red */
        }
    </style>
</head>

<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='tpo-dashboard.html'">
            ← Back
        </button>
        Placement Details
    </div>

    <div class="container">

        <div class="year-card year1" onclick="window.location.href='2025-2026.html'">
            <h3>Academic Year</h3>
            <h2>2025 – 2026</h2>
        </div>

        <div class="year-card year2">
            <h3>Academic Year</h3>
            <h2>2026 – 2027</h2>
        </div>

    </div>

</body>
</html>
