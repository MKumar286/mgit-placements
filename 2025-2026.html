<!DOCTYPE html>
<html>
<head>
    <title>Academic Year 2025-2026</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background-color: #28a745;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            background: white;
            color: #28a745;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .container {
            width: 50%;
            margin: 60px auto;
        }

        .rect-card {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: 0.3s;
            border-left: 8px solid #28a745;
        }

        .rect-card:hover {
            transform: scale(1.02);
        }

        .rect-card h3 {
            margin: 0;
        }

        .card1 { border-left-color: #007bff; }
        .card2 { border-left-color: #ff9800; }
        .card3 { border-left-color: #17a2b8; }
        .card4 { border-left-color: #dc3545; }

    </style>
</head>

<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='placement-details.html'">
            ← Back
        </button>
        Academic Year 2025 – 2026
    </div>

    <div class="container">

        <div class="rect-card card1">
            <h3>📋 Students Master Data</h3>
        </div>

        <div class="rect-card card2" onclick="window.location.href='placement-report-2026.html'">
            <h3>📊 Placement Report</h3>
        </div>

        <div class="rect-card card3">
            <h3>🎓 Placed Students Data</h3>
        </div>

        <div class="rect-card card4">
            <h3>💰 Salary Details</h3>
        </div>

    </div>

</body>
</html>
