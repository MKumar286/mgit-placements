```html
<!DOCTYPE html>
<html>
<head>
<title>Placement Dashboard 2025-2026</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:20px;
font-size:24px;
}

h2{
margin-top:30px;
color:#2c3e50;
}

/* Dashboard Container */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

/* Dashboard Cards */

.card{
width:260px;
height:120px;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* Different Colors */

.salary{border-top:6px solid #3498db;}
.offers{border-top:6px solid #27ae60;}
.placed{border-top:6px solid #e67e22;}
.nature{border-top:6px solid #9b59b6;}
.internship{border-top:6px solid #e74c3c;}

.card h3{
margin:0;
font-size:18px;
color:#2c3e50;
}

</style>

</head>

<body>

<header>
MGIT Training & Placement Portal
</header>

<h2>Placement Dashboard – Academic Year 2025-2026</h2>

<div class="container">

<div class="card salary">
<h3>Salary Details</h3>
</div>

<div class="card offers">
<h3>Branch Wise Offers</h3>
</div>

<div class="card placed">
<h3>Branch Wise Placed Students</h3>
</div>

<div class="card nature">
<h3>Nature of Offers (IT / Core)</h3>
</div>

<div class="card internship">
<h3>Internship Statistics Branch Wise</h3>
</div>

</div>

</body>
</html>
