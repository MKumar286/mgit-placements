<!DOCTYPE html>
<html>
<head>
    <title>TPO Dashboard - MGIT Placements</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background-color: #004e92;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 100px;
            gap: 40px;
        }

        .card {
            background: white;
            width: 250px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h3 {
            margin-bottom: 15px;
        }

        .placement {
            border-top: 5px solid #28a745;
        }

        .employer {
            border-top: 5px solid #ffc107;
        }

        .Training {
            border-top: 5px solid #070bff;
        }

        .ProfessionalTalks {
            border-top: 5px solid #ff07a0;
        }
    </style>
</head>

<body>

    <div class="header">
        MGIT Training & Placement Office Dashboard
    </div>

    <div class="container">

        <div class="card placement" onclick="alert('Placement Details Page Coming Soon!')">
            <h3>Placement Details</h3>
            <p>View and manage student placement data.</p>
        </div>

        <div class="card employer" onclick="alert('Employer Details Page Coming Soon!')">
            <h3>Employer Details</h3>
            <p>View and manage company information.</p>
        </div>

        <div class="card Training Programs" onclick="alert('Training Details Page Coming Soon!')">
            <h3>Training Programs</h3>
            <p>View and manage Training Programs information.</p>
        </div>

        <div class="card ProfessionalTalks" onclick="alert(' Details Page Coming Soon!')">
            <h3>Professional Talks</h3>
            <p>View and manage Placement Talks information.</p>
        </div>

    </div>

</body>
</html>
