<!DOCTYPE html>
<html>
<head>
    <title>MGIT Placements Portal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #004e92, #000428);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 50px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            margin: 20px;
            font-size: 18px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .student {
            background-color: #28a745;
        }

        .student:hover {
            background-color: #1e7e34;
        }

        .tpo {
            background-color: #ffc107;
            color: black;
        }

        .tpo:hover {
            background-color: #e0a800;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>MGIT Placements Portal</h1>
        <p>Welcome to the Training & Placement Cell</p>

        <a href="student-login.html" class="btn student">Student Login</a>
        <a href="tpo-login.html" class="btn tpo">TPO Login</a>
    </div>

    <footer>
        © 2026 MGIT Training & Placement Office
    </footer>

</body>
</html>
