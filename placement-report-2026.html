<!DOCTYPE html>
<html>
<head>
    <title>Placement Report 2025-2026</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            background: white;
            color: #007bff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 250px);
            gap: 40px;
            justify-content: center;
            margin-top: 80px;
        }

        .card {
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h2 {
            margin: 10px 0;
            font-size: 28px;
        }

        .card p {
            margin: 0;
            font-size: 18px;
            color: gray;
        }

        .c1 { border-top: 6px solid #28a745; }
        .c2 { border-top: 6px solid #ffc107; }
        .c3 { border-top: 6px solid #17a2b8; }
        .c4 { border-top: 6px solid #dc3545; }
        .c5 { border-top: 6px solid #6f42c1; }

    </style>
</head>

<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='2025-2026.html'">
            ← Back
        </button>
        Placement Report 2025 – 2026
    </div>

    <div class="dashboard">

        <div class="card c1">
            <p>Total Students</p>
            <h2>420</h2>
        </div>

        <div class="card c2">
            <p>Eligible Students</p>
            <h2>380</h2>
        </div>

        <div class="card c3">
            <p>Placed Students</p>
            <h2>310</h2>
        </div>

        <div class="card c4">
            <p>Highest Package</p>
            <h2>12 LPA</h2>
        </div>

        <div class="card c5">
            <p>Average Package</p>
            <h2>4.8 LPA</h2>
        </div>

    </div>

</body>
</html>
